<svg xmlns="http://www.w3.org/2000/svg" width="780" height="128" viewBox="0 0 780 128">
  <defs>
    <style>
      @font-face {
        font-family: 'Menlo';
        src: local('Menlo'), local('Monaco'), local('Consolas'), local('DejaVu Sans Mono');
      }
      text { font-family: 'Menlo', 'Monaco', 'Consolas', 'DejaVu Sans Mono', monospace; font-size: 13px; }
      .dim { opacity: 0.5; }
    </style>
  </defs>
  <!-- Terminal background -->
  <rect width="780" height="128" rx="8" ry="8" fill="#1a1b26"/>
  <!-- Title bar -->
  <rect width="780" height="32" rx="8" ry="8" fill="#24283b"/>
  <rect y="24" width="780" height="8" fill="#24283b"/>
  <!-- Window buttons -->
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="390" y="20" fill="#a9b1d6" text-anchor="middle" font-size="12">claude-code-statusline</text>

  <!-- Line 1 -->
  <!-- Model -->
  <text x="16" y="62" fill="#ff5fd7" font-weight="bold"> Claude 4.6 Opus</text>
  <!-- Separator -->
  <text x="195" y="62" fill="#565f89" class="dim"> │ </text>
  <!-- Directory -->
  <text x="218" y="62" fill="#c0caf5">~/my-project</text>
  <!-- Separator -->
  <text x="338" y="62" fill="#565f89" class="dim"> │ </text>
  <!-- Git branch -->
  <text x="361" y="62" fill="#7dcfff"> main</text>
  <!-- Git dirty -->
  <text x="425" y="62" fill="#e0af68"> *2</text>
  <!-- Git staged -->
  <text x="455" y="62" fill="#9ece6a"> +1</text>
  <!-- Git untracked -->
  <text x="485" y="62" fill="#f7768e"> ?3</text>
  <!-- Git ahead -->
  <text x="515" y="62" fill="#9ece6a"> ↑1</text>

  <!-- Line 2 -->
  <!-- Context label -->
  <text x="16" y="94" fill="#565f89" class="dim">ctx </text>
  <!-- Progress bar filled (green, ~35%) -->
  <text x="50" y="94" fill="#9ece6a">▓▓▓▓</text>
  <!-- Progress bar empty -->
  <text x="90" y="94" fill="#565f89" class="dim">░░░░░░</text>
  <!-- Context percentage -->
  <text x="150" y="94" fill="#9ece6a"> 35%</text>
  <!-- Separator -->
  <text x="190" y="94" fill="#565f89" class="dim"> │ </text>
  <!-- 5h rate -->
  <text x="213" y="94" fill="#9ece6a">5h:12%</text>
  <!-- Separator -->
  <text x="273" y="94" fill="#565f89" class="dim"> │ </text>
  <!-- 7d rate -->
  <text x="296" y="94" fill="#9ece6a">7d:3%</text>
  <!-- Separator -->
  <text x="348" y="94" fill="#565f89" class="dim"> │ </text>
  <!-- Cost -->
  <text x="371" y="94" fill="#c0caf5">$1.42</text>
  <!-- Separator -->
  <text x="423" y="94" fill="#565f89" class="dim"> │ </text>
  <!-- Duration -->
  <text x="446" y="94" fill="#565f89" class="dim">12m30s</text>
</svg>
